# wallpaper bar
exec-once = waybar &
# numlock
exec-once = numlockx
# i think 🤔🤔
exec-once = ~/.config/hypr/scripts/mount_onedrive.sh
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --all
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Catppuccin-Mocha-Light"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark" 
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Catppuccin-Mocha-Standard-Sapphire-Dark" 
