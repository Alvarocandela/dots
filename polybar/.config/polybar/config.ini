[global/wm]
margin-top    = 0
margin-bottom = 0
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
width = 100%
height = 46
radius = 10
fixed-center = true
monitor = eDP
background = ${colors.bg}
foreground = ${colors.fg}

border-size  = 10
border-color = ${colors.trans}

padding       = 2
module-margin = 1

font-0 = JetbrainsMono Nerd Font:style=Medium:size=11;2

modules-left    = menu bspwm spotify
modules-center  = time
modules-right   = headset pulseaudio memory filesystem network battery

wm-restack = bspwm

cursor-click  = pointer
override-redirect = false


[bar/second]
width = 100%
height = 40
radius = 10
fixed-center = true 
monitor = HDMI-A-0
background = ${colors.bg}
foreground = ${colors.fg}

border-size  = 10
border-color = ${colors.trans}

padding       = 1
module-margin = 1

font-0 = JetbrainsMono Nerd Font:style=Medium:size=11;2

modules-left    = menu bspwm
modules-center  = date
modules-right   = pulseaudio network

wm-restack = bspwm

cursor-click  = pointer
override-redirect = false



[bar/study1]
width = 100%
monitor = eDP
height = 35
radius = 10
fixed-center = true
background = ${colors.bg}
foreground = #ffffff

border-size  = 0
border-color = ${colors.trans}

padding       = 2
module-margin = 1

font-0 = JetbrainsMono Nerd Font:style=Medium:size=11;2

modules-left    = menu bspwm spotify
modules-center  = date
modules-right   = headset pulseaudio battery

wm-restack = bspwm

cursor-click  = pointer
override-redirect = true

[bar/study2]
width = 100%
monitor = HDMI-A-0
height = 35
radius = 10
fixed-center = true
background = ${colors.bg}
foreground = #ffffff

border-size  = 0
border-color = ${colors.trans}

padding       = 2
module-margin = 1

font-0 = JetbrainsMono Nerd Font:style=Medium:size=11;2

modules-left    = menu bspwm spotify
modules-center  = date
modules-right   = pulseaudio network

wm-restack = bspwm

cursor-click  = pointer
[settings]
screenchange-reload = true
